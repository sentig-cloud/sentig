<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tag Camera Pro Max</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --bg: #000; --panel: #1a1a1a; --accent: #00a2ff; --on-chrome: #ff0000; --on-web: #007bff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Pretendard', -apple-system, sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        .top-panel { height: 60px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; border-bottom: 1px solid #333; z-index: 100; }
        .tool-group { display: flex; align-items: center; width: 100%; justify-content: space-between; }
        .tool-row { display: flex; align-items: center; gap: 10px; border-right: 1px solid #444; padding-right: 10px; }
        .palette-row { display: flex; gap: 8px; padding-left: 5px; }
        .tool-btn { background: none; border: none; color: #aaa; font-size: 18px; font-weight: 900; cursor: pointer; transition: 0.2s; padding: 5px; font-family: sans-serif; }
        .tool-btn:active { color: #fff; transform: scale(0.9); }
        .line-width-select { background: #222; border: 1px solid #555; color: #fff; border-radius: 6px; padding: 5px; font-size: 13px; outline: none; cursor: pointer; }
        .dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; transition: 0.2s; }
        .dot.selected { transform: scale(1.3); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .status-indicator { font-size: 10px; font-weight: 900; padding: 4px 8px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); letter-spacing: 0.5px; cursor: pointer; text-align: center; min-width: 42px; transition: 0.3s; }
        .status-indicator.chrome { background: var(--on-chrome); color: white; box-shadow: 0 0 10px var(--on-chrome); animation: blink 2s infinite; }
        .status-indicator.web { background: var(--on-web); color: white; border-color: #55aaff; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .frame-container { flex: 1; position: relative; padding: 10px 15px; background: #000; display: flex; flex-direction: column; }
        .camera-frame { position: relative; flex: 1; border: 2px solid #333; border-radius: 16px; overflow: hidden; background: #111; box-shadow: inset 0 0 20px #000; }
        #video, #external-img, #canvas, #tag-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #external-img { display: none; z-index: 3; }
        #canvas { z-index: 5; touch-action: none; pointer-events: auto; }
        #tag-layer { z-index: 10; pointer-events: none; display: flex; flex-direction: column; align-items: flex-end; padding: 25px; box-sizing: border-box; text-shadow: 2px 2px 5px rgba(0,0,0,0.8), -1px -1px 3px rgba(0,0,0,0.5); gap: 8px; }
        #display-location { order: 1; font-size: 1em; font-weight: bold; opacity: 0.95; }
        #display-time { order: 2; font-size: 1em; font-weight: bold; font-family: monospace; opacity: 0.95; }
        #display-text { order: 3; font-size: 1em; font-weight: bold; }
        #tag-layer.pos-bottom #display-text { order: 1; }
        #tag-layer.pos-bottom #display-time { order: 2; }
        #tag-layer.pos-bottom #display-location { order: 3; }
        .tag-input-area { background: var(--panel); padding: 12px 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        #tag-input { flex: 1; background: #222; border: 1px solid #555; color: white; padding: 10px 15px; border-radius: 10px; outline: none; font-size: 15px; transition: border-color 0.2s;}
        #tag-input:focus { border-color: var(--accent); }
        .clear-btn { background: #444; border: none; color: white; padding: 0 15px; border-radius: 10px; cursor: pointer; transition: 0.2s; font-weight: bold;}
        .clear-btn:active { background: #666; transform: scale(0.95);}
        .bottom-panel { height: 165px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-top: 1px solid #333; z-index: 100; }
        .side-group, .shutter-btn, .joystick { flex-shrink: 0; }
        .side-group { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 115px; }
        .loc-btn { width: 50px; height: 50px; background: #222; border: 2px solid #555; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 20px; position: relative; overflow: hidden; transition: 0.2s; box-shadow: 0 3px 8px rgba(0,0,0,0.4); }
        .loc-btn:active { transform: scale(0.9); background: #333; color: #fff; }
        #location-select { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .mini-shutter { width: 50px; height: 50px; background: #fff; border: 4px solid #555; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #333; font-size: 18px; cursor: pointer; transition: 0.1s; box-shadow: 0 3px 8px rgba(0,0,0,0.4);}
        .mini-shutter:active { transform: scale(0.9); background: #eee; }
        #file-input { display: none; }
        .shutter-btn { width: 85px; height: 85px; background: white; border-radius: 50%; border: 7px solid #444; outline: none; transition: 0.1s; box-shadow: 0 5px 20px rgba(0,0,0,0.5); cursor: pointer;}
        .shutter-btn:active { transform: scale(0.85); background: #bbb; }
        .joystick { display: grid; grid-template-areas: ". up ." "left mid right" ". down ."; gap: 10px; align-items: center; justify-items: center; width: 115px; }
        .joy-btn { background: #333; border: 1px solid #555; color: white; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 3px 0 #111; font-size: 14px; transition: 0.1s; }
        .joy-btn:active { transform: translateY(2px); box-shadow: none; }
        .joy-mid { grid-area: mid; width: 40px; height: 40px; border-radius: 50%; background: #444; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 18px; }
        .joy-mid.active { background: var(--accent); color: white; border: 2px solid white; box-shadow: 0 0 12px var(--accent); }
        #flash-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:white; opacity:0; pointer-events:none; z-index:100; transition: opacity 0.1s; }
    </style>
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=a98dc9f222bbe3e9c81c9bf44e8e0eba&libraries=services"></script>
</head>
<body onclick="checkStart()">

    <div class="top-panel">
        <div class="tool-group">
            <div class="tool-row">
                <div id="browser-status" class="status-indicator web" onclick="setSaveFolder()">WEB</div>
                <button class="tool-btn" onclick="undo()" title="1획 지우기">1</button>
                <button class="tool-btn" onclick="clearDraw()" title="모두 지우기">A</button>
                <select id="line-width" class="line-width-select" onchange="changeLineWidth()">
                    <option value="3">얇게</option>
                    <option value="6" selected>보통</option>
                    <option value="14">굵게</option>
                </select>
            </div>
            <div class="palette-row">
                <div class="dot" style="background:red" onclick="setGlobalColor('red', this)"></div>
                <div class="dot" style="background:green" onclick="setGlobalColor('green', this)"></div>
                <div class="dot" style="background:blue" onclick="setGlobalColor('blue', this)"></div>
                <div class="dot" style="background:black" onclick="setGlobalColor('black', this)"></div>
                <div class="dot" style="background:white" onclick="setGlobalColor('white', this)"></div>
            </div>
        </div>
    </div>

    <div class="frame-container">
        <div class="camera-frame">
            <video id="video" autoplay playsinline muted></video>
            <img id="external-img">
            <canvas id="canvas"></canvas>
            <div id="tag-layer" class="pos-top">
                <div id="display-location"></div>
                <div id="display-time"></div>
                <div id="display-text"></div>
            </div>
            <div id="flash-overlay"></div>
        </div>
    </div>

    <div class="tag-input-area">
        <input type="text" id="tag-input" placeholder="태그 내용을 입력하세요..." oninput="updateTagText()" autocomplete="off" spellcheck="false">
        <button class="clear-btn" onclick="clearTagInput()">지우기</button>
    </div>

    <div class="bottom-panel">
        <div class="side-group">
            <div class="loc-btn" title="주소 설정">
                <i class="fas fa-map-marker-alt"></i>
                <select id="location-select" onchange="changeLocation()">
                    <option value="">주소 없음</option>
                    <option value="gps_new">GPS 신주소(도로명)</option>
                    <option value="gps_old">GPS 구주소(지번)</option>
                </select>
            </div>
            <label for="file-input" class="mini-shutter" title="사진 불러오기">
                <i class="fas fa-images"></i>
            </label>
            <input type="file" id="file-input" accept="image/*" onchange="loadExternalImg(this)">
        </div>
        <button class="shutter-btn" onclick="takeFinalPhoto()"></button>
        <div class="joystick">
            <div class="joy-btn" style="grid-area: up" onclick="setTagPos('top')"><i class="fas fa-chevron-up"></i></div>
            <div class="joy-btn" style="grid-area: down" onclick="setTagPos('bottom')"><i class="fas fa-chevron-down"></i></div>
            <div class="joy-btn" style="grid-area: left" onclick="adjTagSize(-2)"><i class="fas fa-minus"></i></div>
            <div class="joy-btn" style="grid-area: right" onclick="adjTagSize(2)"><i class="fas fa-plus"></i></div>
            <div class="joy-mid" id="joy-time-btn" onclick="toggleTime()"><i class="fas fa-clock"></i></div>
        </div>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const extImg = document.getElementById('external-img');
    const tagLayer = document.getElementById('tag-layer');
    const displayTime = document.getElementById('display-time');
    const displayText = document.getElementById('display-text');
    const displayLocation = document.getElementById('display-location');
    const tagInput = document.getElementById('tag-input');
    const flashOverlay = document.getElementById('flash-overlay');
    const locationSelect = document.getElementById('location-select');
    const lineWidthSelect = document.getElementById('line-width');

    let paths = [], currentPath = [], isDrawing = false, isCamStarted = false;
    let isExternalMode = false, directoryHandle = null;
    let alertedNoKey = false;
    
    let config = JSON.parse(localStorage.getItem('tagCfg_v10')) || { 
        showTime: true, pos: 'top', size: 26, color: 'red', lineWidth: 6, 
        locationText: '', locationSelectValue: '', customTagText: ''
    };

geocoder.coord2Address(lng, lat, function(result, status) {
    if (status === kakao.maps.services.Status.OK) {
        let address = "";
        const doc = result[0];
        
        if (val === 'gps_old') {
            // 1. 구주소(지번) 추출: 주소명 + 번지수 강제 결합
            if (doc.address) {
                let mainNo = doc.address.main_address_no;
                let subNo = doc.address.sub_address_no;
                address = doc.address.address_name;
                
                // 주소 이름에 숫자가 포함 안 되어 있다면 강제로 붙임
                if (mainNo && !address.includes(mainNo)) {
                    address += " " + mainNo + (subNo ? "-" + subNo : "");
                }
            } else {
                address = "지번 정보 없음";
            }
        } else {
            // 2. 신주소(도로명) 추출: 도로명 + 건물번호 강제 결합
            if (doc.road_address) {
                address = doc.road_address.address_name;
                let mainNo = doc.road_address.main_building_no;
                let subNo = doc.road_address.sub_building_no;
                
                // 도로명에 건물번호가 없다면 강제로 붙임
                if (mainNo && !address.includes(mainNo)) {
                    address += " " + mainNo + (subNo ? "-" + subNo : "");
                }
            } else if (doc.address) {
                address = doc.address.address_name + " (지번대체)";
            } else {
                address = "주소 정보 없음";
            }
        }
        
        config.locationText = address;
        displayLocation.innerText = address;
        saveConfig();
    } else {
        alert("카카오 서버에서 데이터를 받지 못했습니다.");
    }
});

    
    function initBrowserStatus() {
        const ua = navigator.userAgent;
        const isChrome = /Chrome/.test(ua) && /Google Inc/.test(navigator.vendor);
        const isSamsung = /SamsungBrowser/.test(ua);
        const statusEl = document.getElementById('browser-status');
        if (isChrome && !isSamsung) {
            statusEl.innerText = "CHROME"; statusEl.className = "status-indicator chrome";
        } else {
            statusEl.innerText = isSamsung ? "SAMSUNG" : "WEB"; statusEl.className = "status-indicator web";
        }
    }

    async function startCam() {
        if (window.stream) window.stream.getTracks().forEach(t => t.stop());
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } });
            window.stream = stream; video.srcObject = stream;
            video.onloadedmetadata = () => {
                isCamStarted = true; canvas.width = video.videoWidth; canvas.height = video.videoHeight; redraw();
            };
        } catch (e) { console.log("카메라 초기화 실패"); }
    }

    function checkStart() { if(!isCamStarted) startCam(); }

    async function setSaveFolder() {
        if (!window.showDirectoryPicker) return alert("다운로드 폴더로 기본 저장됩니다.");
        try { directoryHandle = await window.showDirectoryPicker({ id: 'pic_folder', startIn: 'pictures' }); alert("저장 폴더가 설정되었습니다."); } catch (e) { }
    }

    function loadExternalImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { extImg.src = e.target.result; extImg.style.display = 'block'; video.style.display = 'none'; isExternalMode = true; };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateClock() {
        const n = new Date(); const week = ['일', '월', '화', '수', '목', '금', '토'];
        displayTime.innerText = `${n.getFullYear()}.${String(n.getMonth()+1).padStart(2,'0')}.${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')} (${week[n.getDay()]})`;
    }
    setInterval(updateClock, 1000);

    function getFileTimestamp() { const n = new Date(); return `${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}_${String(n.getHours()).padStart(2,'0')}${String(n.getMinutes()).padStart(2,'0')}${String(n.getSeconds()).padStart(2,'0')}`; }

    // ⭐️ 완벽하게 복구된 카카오 지번/도로명 주소 불러오기 코드
    function changeLocation() {
        const val = locationSelect.value;
        config.locationSelectValue = val;
        
        if (val.startsWith('gps')) {
            displayLocation.innerText = "위치 찾는 중...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;

                        if (typeof kakao !== 'undefined' && kakao.maps && kakao.maps.services) {
                            var geocoder = new kakao.maps.services.Geocoder();
                            
                            geocoder.coord2Address(lng, lat, function(result, status) {
                                if (status === kakao.maps.services.Status.OK) {
                                    let address = "";
                                    const doc = result[0];
                                    
                                    if (val === 'gps_old') {
                                        // 구주소(지번)
                                        if (doc.address && doc.address.address_name) {
                                            address = doc.address.address_name;
                                        } else {
                                            address = "해당 위치의 지번 주소 없음";
