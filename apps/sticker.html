<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Sticky Notes - Fix</title>
    <style>
        :root { --accent: #BB86FC; --note-bg: #fff9c4; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; font-family: 'Segoe UI', 'Pretendard', sans-serif; overflow: hidden; background-color: transparent; }

        .card-base { display: flex; flex-direction: column; height: 100vh; width: 100%; background: var(--note-bg); overflow: hidden; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }
        .card-header { height: 40px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: rgba(0,0,0,0.05); }
        .header-btn { cursor: pointer; font-size: 22px; font-weight: bold; color: #555; width: 30px; border: none; background: none; outline: none; }
        .nav-items { display: flex; gap: 8px; flex-grow: 1; justify-content: center; }
        .nav-item { cursor: pointer; font-size: 13px; font-weight: bold; color: #888; padding: 2px 8px; border-radius: 4px; transition: 0.2s; }
        .nav-item.active { color: #000; background-color: rgba(255,255,255,0.6); }

        .sticker-content { 
            flex: 1; padding: 20px; font-size: 1.1rem; outline: none; color: #222; 
            overflow-y: auto; white-space: pre-wrap; line-height: 1.6; 
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .sticker-content::-webkit-scrollbar { display: none; }

        .sticky-footer { height: 45px; display: grid; grid-template-columns: repeat(4, 1fr); background-color: rgba(0,0,0,0.07); border-top: 1px solid rgba(0,0,0,0.05); }
        .tool-btn { background: none; border: none; cursor: pointer; font-size: 18px; color: #444; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .tool-btn:active { background: rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="sticky-container"></div>

    <script>
        let notes = JSON.parse(localStorage.getItem('stickyNotes')) || [{ text: '', color: '#fff9c4' }];
        let nIdx = 0;

        function renderNotes() {
            const container = document.getElementById('sticky-container');
            const note = notes[nIdx];
            container.innerHTML = `
                <div class="card-base" style="background:${note.color}">
                    <div class="card-header">
                        <button class="header-btn" style="visibility:${notes.length < 5 ? 'visible' : 'hidden'}" onclick="addNote()">+</button>
                        <div class="nav-items">
                            ${notes.map((_, i) => `<span class="nav-item ${i === nIdx ? 'active' : ''}" onclick="changeNote(${i})">${i+1}</span>`).join('')}
                        </div>
                        <button class="header-btn" style="visibility:${notes.length > 1 ? 'visible' : 'hidden'}" onclick="removeNote()">&minus;</button>
                    </div>
                    <div class="sticker-content" id="editor" contenteditable="true" spellcheck="false" 
                         onkeydown="handleKeyDown(event)" oninput="handleInput(this)">${note.text}</div>
                    <div class="sticky-footer">
                        <button class="tool-btn" onclick="toggleFormat('check')">☑</button>
                        <button class="tool-btn" onclick="toggleFormat('bullet')">≡</button>
                        <button class="tool-btn" onclick="toggleFormat('bold')">B</button>
                        <button class="tool-btn" onclick="toggleFormat('strike')">S</button>
                    </div>
                </div>
            `;
            // 렌더링 후 스크롤 하단 고정 방지 및 포커스 유지 처리 가능
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter') {
                const sel = window.getSelection();
                if (!sel.rangeCount) return;
                const range = sel.getRangeAt(0);

                // 현재 줄의 텍스트 분석
                const currentLineText = range.startContainer.textContent || "";
                
                // 줄 시작 부분에 리스트 기호가 있는지 확인 (공백 무시)
                const isCheck = currentLineText.trimStart().startsWith('☐');
                const isBullet = currentLineText.trimStart().startsWith('•');

                if (isCheck || isBullet) {
                    e.preventDefault();
                    let prefix = isCheck ? "☐ " : "• ";
                    
                    const br = document.createElement('br');
                    const node = document.createTextNode(prefix);
                    
                    range.deleteContents();
                    range.insertNode(br);
                    range.setStartAfter(br);
                    range.insertNode(node);
                    range.setStartAfter(node);
                    range.collapse(true);
                    sel.removeAllRanges();
                    sel.addRange(range);
                    
                    autoScroll(document.getElementById('editor'));
                }
                // 리스트 기호가 없으면 브라우저 기본 엔터(줄바꿈) 동작 수행
            }
        }

        function handleInput(el) {
            notes[nIdx].text = el.innerHTML;
            saveToStorage();
            autoScroll(el);
        }

        // 커서를 따라가는 자동 스크롤 로직
        function autoScroll(el) {
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                const range = selection.getRangeAt(0);
                const rect = range.getBoundingClientRect();
                const parentRect = el.getBoundingClientRect();

                // 커서가 에디터 하단을 벗어나면 스크롤 조정
                if (rect.bottom > parentRect.bottom) {
                    el.scrollTop += (rect.bottom - parentRect.bottom) + 20;
                }
            }
        }

        function toggleFormat(type) {
            const sym = { check: '☐ ', bullet: '• ' };
            const editor = document.getElementById('editor');
            editor.focus();
            if (sym[type]) {
                document.execCommand('insertText', false, sym[type]);
            } else {
                document.execCommand(type === 'bold' ? 'bold' : 'strikethrough');
            }
        }

        function changeNote(idx) { nIdx = idx; renderNotes(); }
        function addNote() { if(notes.length < 5) { notes.push({ text: '', color: '#fff9c4' }); nIdx = notes.length - 1; renderNotes(); saveToStorage(); } }
        function removeNote() { if(notes.length > 1) { notes.splice(nIdx, 1); nIdx = Math.max(0, nIdx - 1); renderNotes(); saveToStorage(); } }
        function saveToStorage() { localStorage.setItem('stickyNotes', JSON.stringify(notes)); }

        renderNotes();
    </script>
<script>
    // --- Hybrid OS 스와이프 연동 스크립트 ---
    // 이 코드를 넣으면 앱 안에서 좌우로 스와이프할 때 바탕화면 페이지가 넘어갑니다!
    let _os_sX = 0, _os_sY = 0, _os_isSwipe = false;
    
    document.addEventListener('touchstart', e => { 
        _os_sX = e.touches[0].clientX; 
        _os_sY = e.touches[0].clientY; 
        _os_isSwipe = true;
    }, {passive: true});
    
    document.addEventListener('touchmove', e => {
        if(!_os_isSwipe) return;
        let dx = e.touches[0].clientX - _os_sX;
        let dy = e.touches[0].clientY - _os_sY;
        // 위아래로 스크롤하는 움직임이 더 크면 스와이프(페이지 넘김) 취소
        if(Math.abs(dy) > Math.abs(dx)) _os_isSwipe = false; 
    }, {passive: true});
    
    document.addEventListener('touchend', e => {
        if(!_os_isSwipe) return;
        let dx = e.changedTouches[0].clientX - _os_sX;
        // 좌우로 50px 이상 쓸어 넘겼을 때 OS로 신호 전송
        if (Math.abs(dx) > 50) {
            window.parent.postMessage({ type: 'os_swipe', dir: dx > 0 ? 'right' : 'left' }, '*');
        }
    });
</script>
</body>
</html>
