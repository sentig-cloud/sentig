    });

    function initDrag(e, mode, isWin, refId, el) {
        if(e.target.closest('button') || e.target.tagName === 'BUTTON') return; 
        
        dCore.active = true; dCore.mode = mode; dCore.isWin = isWin; dCore.refId = refId; dCore.el = el;
        dCore.sX = e.clientX; dCore.sY = e.clientY; dCore.moved = false;
        
        el.style.zIndex = 9999; 

        if(isWin && mode === 'drag' && !state.config.showGrid && el.classList.contains('maximized')) {
            dCore.iX = 20; dCore.iY = 20; dCore.iW = window.innerWidth*0.8; dCore.iH = window.innerHeight*0.7;
            el.classList.remove('maximized');
            el.style.width = dCore.iW+'px'; el.style.height = dCore.iH+'px';
        } else {
            dCore.iX = el.offsetLeft; 
            dCore.iY = el.offsetTop; 
            dCore.iW = el.offsetWidth; 
            dCore.iH = el.offsetHeight;
        }
    }

    function closeAllMenus() {
        document.getElementById('start-menu').style.display = 'none';
        document.getElementById('ctx-menu').style.display = 'none';
    }

    function toggleStartMenu(e) {
        if(e) e.stopPropagation(); 
        const m = document.getElementById('start-menu');
        if (m.style.display === 'flex') closeAllMenus();
        else { closeAllMenus(); m.style.display = 'flex'; }
        runtime.lastCtxPos = null;
    }

    let swipeSX = 0, swipeSY = 0, isSwiping = false;
    const vp = document.getElementById('viewport');
    const pagesContainer = document.getElementById('pages-container');

    vp.addEventListener('touchstart', e => {
        if(e.target.closest('.icon-wrapper') || e.target.closest('.title-bar') || e.target.closest('.scale-dot') || e.target.closest('button') || e.target.closest('.sys-modal') || e.target.closest('.folder-item')) return; 
        swipeSX = e.touches[0].clientX; swipeSY = e.touches[0].clientY; isSwiping = true; 
        pagesContainer.style.transition = 'none';
    }, {passive:true});

    vp.addEventListener('touchmove', e => {
        if(!isSwiping) return;
        let dx = e.touches[0].clientX - swipeSX; let dy = e.touches[0].clientY - swipeSY;
        if(Math.abs(dy) > Math.abs(dx)) { isSwiping = false; return; } 
        pagesContainer.style.transform = `translateX(${dx}px)`;
    }, {passive:true});

    vp.addEventListener('touchend', e => {
        if(!isSwiping) return;
        let dx = e.changedTouches[0].clientX - swipeSX;
        if(dx > 50) jumpToPage(runtime.currPage - 1); 
        else if(dx < -50) jumpToPage(runtime.currPage + 1); 
        else jumpToPage(runtime.currPage); 
        isSwiping = false;
    });

    window.addEventListener('message', e => {
        if(e.data && e.data.type === 'os_swipe') {
            if(e.data.dir === 'left') jumpToPage(runtime.currPage + 1); 
            else if(e.data.dir === 'right') jumpToPage(runtime.currPage - 1);
        }
    });

    let bgTimer, bgSX, bgSY, isBgPress = false;
    let pressTarget = null;
    
    vp.addEventListener('pointerdown', e => {
        if(e.button !== 0 && e.pointerType === 'mouse') return; 
        if(e.target.closest('button') || e.target.tagName === 'BUTTON') return;

        let clickedWin = e.target.closest('.window-box');
        let isFolderWin = false;
        if(clickedWin) {
            let wId = clickedWin.id;
            let wObj = runtime.windows.find(w=>w.id===wId);
            if(wObj && wObj.type === 'folder') isFolderWin = true;
        }
        if(!isFolderWin) closeAllFolders();

        if(e.target.closest('.window-box') || e.target.closest('.system-modal')) return;
        
        if(e.target.closest('.icon-wrapper') || e.target.closest('.widget-box')) {
            pressTarget = e.target.closest('.icon-wrapper') || e.target.closest('.widget-box');
        } else {
            pressTarget = e.target.closest('.page');
        }

        isBgPress = true; 
        bgSX = e.clientX; bgSY = e.clientY;
        closeAllMenus();
        
        bgTimer = setTimeout(() => { 
            if(isBgPress) {
                isLongPressedGlobal = true; 
                if(pressTarget && pressTarget.classList.contains('page')) {
                    openCtxMenu(e.clientX, e.clientY, 'desktop');
                } else if (pressTarget && !pressTarget.closest('.folder-item')) {
                    openCtxMenu(e.clientX, e.clientY, 'item', pressTarget.id.replace('node_', ''));
                }
            } 
        }, 800);
    });
    vp.addEventListener('pointermove', e => { if(Math.abs(e.clientX-bgSX)>10 || Math.abs(e.clientY-bgSY)>10) { isBgPress=false; clearTimeout(bgTimer); } });
    vp.addEventListener('pointerup', () => { isBgPress=false; clearTimeout(bgTimer); });
    
    vp.addEventListener('contextmenu', e => {
        if(e.target.closest('.window-box') || e.target.closest('#taskbar') || e.target.closest('.system-modal')) return;
        e.preventDefault(); closeAllMenus();
        let item = e.target.closest('.icon-wrapper') || e.target.closest('.widget-box');
        if(item && !e.target.closest('.folder-item')) openCtxMenu(e.clientX, e.clientY, 'item', item.id.replace('node_', ''));
        else if(e.target.closest('.page')) openCtxMenu(e.clientX, e.clientY, 'desktop');
    });

    function openCtxMenu(x, y, type, id=null) {
        isBgPress = false; clearTimeout(bgTimer);
        const ctx = document.getElementById('ctx-menu');
        targetItemId = id;
        runtime.lastCtxPos = { x, y };

        if(type === 'desktop') {
            ctx.innerHTML = `
                <div class="ctx-item" onpointerdown="handleWinBtn(event, 'folder-add', null); openSysModal('modal-desktop-add')"><i class="fas fa-plus-square" style="color:var(--win);"></i> 바탕화면에 추가</div>
                <div class="ctx-item" onpointerdown="handleWinBtn(event, 'folder-add', null); createFolderDirect()"><i class="fas fa-folder-plus" style="color:var(--folder-color);"></i> 새 폴더 만들기</div>
                <hr class="win-hr">
                <div class="ctx-item" onpointerdown="handleWinBtn(event, 'folder-add', null); modPage(1)"><i class="fas fa-file-medical" style="color:green;"></i> 화면 추가</div>
                <div class="ctx-item" onpointerdown="handleWinBtn(event, 'folder-add', null); modPage(-1)"><i class="fas fa-file-excel" style="color:red;"></i> 화면 삭제</div>
                <div class="ctx-item" onpointerdown="handleWinBtn(event, 'folder-add', null); setHome()"><i class="fas fa-home" style="color:coral;"></i> 홈 화면 지정</div>
            `;
        } else if (type === 'item') {
            ctx.innerHTML = `
                <div class="ctx-item" onpointerdown="handleWinBtn(event, 'folder-add', null); renameItem()"><i class="fas fa-pen"></i> 이름 변경하기</div>
                <div class="ctx-item" onpointerdown="handleWinBtn(event, 'folder-add', null); deleteItem()"><i class="fas fa-trash" style="color:red;"></i> 완전히 삭제하기</div>
            `;
        }
        ctx.style.display = 'flex';
        ctx.style.left = Math.min(x, window.innerWidth - 170) + 'px';
        ctx.style.top = Math.min(y, window.innerHeight - 200) + 'px';
    }

    let calViewDate = new Date();
    function toggleCalendar(e) {
        if(e) e.stopPropagation();
        closeAllMenus();
        let cal = document.getElementById('modal-calendar');
        if(cal.style.display === 'flex') {
            cal.style.display = 'none';
            document.getElementById('modal-overlay').style.display = 'none';
        } else {
            document.querySelectorAll('.sys-modal').forEach(m => m.style.display = 'none');
            document.getElementById('modal-overlay').style.display = 'flex';
            cal.style.display = 'flex';
            calViewDate = new Date();
            renderCalendarGrid();
        }
    }

    function navCalYear(dir) { calViewDate.setFullYear(calViewDate.getFullYear() + dir); renderCalendarGrid(); }
    function navCalMonth(dir) { calViewDate.setMonth(calViewDate.getMonth() + dir); renderCalendarGrid(); }

    function editCalDate(type) {
        if(type === 'year') {
            document.getElementById('cal-year-text').style.display = 'none';
            let input = document.getElementById('cal-year-input');
            input.style.display = 'block';
            input.value = calViewDate.getFullYear();
            input.focus();
            input.select(); 
        } else {
            document.getElementById('cal-month-text').style.display = 'none';
            let input = document.getElementById('cal-month-input');
            input.style.display = 'block';
            input.value = calViewDate.getMonth() + 1;
            input.focus();
            input.select(); 
        }
    }

    function finishEditCalDate(type) {
        if(type === 'year') {
            document.getElementById('cal-year-text').style.display = 'block';
            document.getElementById('cal-year-input').style.display = 'none';
            let val = parseInt(document.getElementById('cal-year-input').value);
            if(!isNaN(val) && val > 1900) calViewDate.setFullYear(val);
        } else {
            document.getElementById('cal-month-text').style.display = 'block';
            document.getElementById('cal-month-input').style.display = 'none';
            let val = parseInt(document.getElementById('cal-month-input').value);
            if(!isNaN(val) && val >= 1 && val <= 12) calViewDate.setMonth(val - 1);
        }
        renderCalendarGrid();
    }

    function renderCalendarGrid() {
        let y = calViewDate.getFullYear(); let m = calViewDate.getMonth();
        let firstDay = new Date(y, m, 1).getDay();
        let daysInMonth = new Date(y, m+1, 0).getDate();
        let now = new Date();
        
        document.getElementById('cal-year-text').innerText = y + '년';
        document.getElementById('cal-month-text').innerText = (m + 1) + '월';

        let holidays = ['01-01','03-01','05-05','06-06','08-15','10-03','10-09','12-25'];
        
        let html = '';
        const days = ['일','월','화','수','목','금','토'];
        days.forEach((d, idx) => {
            let color = idx === 0 ? 'red' : (idx === 6 ? 'var(--win-blue)' : 'inherit');
            html += `<div style="font-weight:bold; background:var(--win); color:white; padding:4px 0;">${d}</div>`;
        });
        
        for(let i=0; i<firstDay; i++) html += `<div></div>`;
        for(let i=1; i<=daysInMonth; i++) {
            let dateStr = String(m+1).padStart(2,'0') + '-' + String(i).padStart(2,'0');
            let dayOfWeek = new Date(y, m, i).getDay();
            let isHoliday = holidays.includes(dateStr) || dayOfWeek === 0;
            let isToday = (y === now.getFullYear() && m === now.getMonth() && i === now.getDate());
            
            let bg = isToday ? 'background:#ffcc00; font-weight:bold; border:1px solid red;' : 'background:var(--input-bg);';
            let color = isHoliday ? (isToday ? 'color:#000;' : 'color:red;') : (dayOfWeek === 6 ? 'color:var(--win-blue);' : 'color:var(--input-text);');
            if(isToday && !isHoliday) color = 'color:#000;'; 
            
            html += `<div style="padding:6px 0; border:1px solid var(--bar); ${bg} ${color}">${i}</div>`;
        }
        document.getElementById('cal-grid').innerHTML = html;
    }

    function buildDesktopPages() {
        pagesContainer.innerHTML = '';
        let pages = state.config.pages;
        for(let i=1; i<=pages; i++) pagesContainer.innerHTML += `<div class="page" id="page-${i}"></div>`;
        updatePagePositions();
    }

    function updatePagePositions() {
        let pages = state.config.pages;
        for(let i=1; i<=pages; i++) {
            let pEl = document.getElementById(`page-${i}`);
            if(!pEl) continue;
            let diff = i - runtime.currPage;
            if (diff > Math.floor(pages/2)) diff -= pages;
            if (diff < -Math.floor(pages/2)) diff += pages;
            pEl.style.left = (diff * 100) + 'vw';
        }
        pagesContainer.style.transition = 'none';
        pagesContainer.style.transform = `translateX(0px)`;
        
        const dots = document.getElementById('page-dots');
        dots.innerHTML = '';
        for(let i=1; i<=pages; i++) {
            let c = i === runtime.currPage ? '#00ff00' : '#808080';
            let z = i === runtime.currPage ? 10 : i;
            let leftOffset = (i-1) * 6;
            let topOffset = (i-1) * 3;
            dots.innerHTML += `<i class="fas fa-desktop page-dot" style="color:${c}; z-index:${z}; left:${leftOffset}px; top:${topOffset}px;" onpointerdown="handleWinBtn(event, 'folder-add', null); jumpToPage(${i});"></i>`;
        }
    }

    function jumpToPage(p) {
        let pages = state.config.pages;
        if(p < 1) p = pages; if(p > pages) p = 1;
        let diff = p - runtime.currPage;
        if (diff > Math.floor(pages/2)) diff -= pages;
        if (diff < -Math.floor(pages/2)) diff += pages;

        pagesContainer.style.transition = 'transform 0.3s ease-out';
        pagesContainer.style.transform = `translateX(${-diff * 100}vw)`;
        runtime.currPage = p;
        setTimeout(() => { updatePagePositions(); }, 300);
    }
    
    function jumpToHome() { jumpToPage(state.config.home || 1); }

    function modPage(v) {
        closeAllMenus();
        if(v > 0) { state.config.pages++; forceSaveDB(); buildDesktopPages(); jumpToPage(state.config.pages); }
        else {
            if(state.config.pages <= 1) { showMsg("마지막 페이지입니다."); return; }
            state.items = state.items.filter(i => getMetrics(i).page !== runtime.currPage);
            state.items.forEach(i => { if(i.pc && i.pc.page > runtime.currPage) i.pc.page--; if(i.mobile && i.mobile.page > runtime.currPage) i.mobile.page--; });
            state.config.pages--;
            if(state.config.home > state.config.pages) state.config.home = state.config.pages;
            if(runtime.currPage > state.config.pages) runtime.currPage = state.config.pages;
            forceSaveDB(); buildDesktopPages(); renderDesktop(); jumpToPage(runtime.currPage);
        }
    }
    function setHome() { closeAllMenus(); state.config.home = runtime.currPage; forceSaveDB(); showMsg("현재 화면이 홈 화면으로 지정되었습니다."); }

    function toggleGrid(isOn) {
        state.config.showGrid = isOn;
        document.getElementById('cb-grid').checked = isOn;
        if(isOn) document.body.classList.add('show-grid');
        else document.body.classList.remove('show-grid');
        forceSaveDB();
    }

    function autoAlignItems() {
        closeSysModals();
        let pageItems = state.items.filter(i => !i.parentId && getMetrics(i).page === runtime.currPage);
        let icons = pageItems.filter(i => i.type === 'icon' || i.type === 'folder');
        let widgets = pageItems.filter(i => i.type === 'widget' || i.type === 'folder-widget');
        
        let cx = 20, cy = 20;
        let maxW = window.innerWidth;
        let colWidth = 80 * state.config.scale;
        let rowHeight = 100 * state.config.scale;
        
        icons.forEach(i => {
            let m = getMetrics(i);
            m.x = cx; m.y = cy;
            cx += colWidth;
            if (cx + colWidth > maxW) {
                cx = 20; cy += rowHeight;
            }
        });
        
        if(icons.length > 0) { cx = 20; cy += rowHeight; }
        
        widgets.forEach(w => {
            let m = getMetrics(w);
            if(cx + m.w + 20 > maxW && cx !== 20) {
                cx = 20; cy += (m.h + 20); 
            }
            m.x = cx; m.y = cy;
            cx += (m.w + 20);
            if(cx > maxW) { cx = 20; cy += (m.h + 20); }
        });

        forceSaveDB(); renderDesktop(); drawWindows();
        showMsg("현재 화면의 아이템이 겹치지 않게 자동 정렬되었습니다.");
    }

    function renderDesktop() {
        let validIds = new Set();
        
        state.items.forEach(item => {
            if(item.parentId) return; 
            let m = getMetrics(item);
            let p = document.getElementById(`page-${m.page}`);
            if(!p) return;
            validIds.add('node_' + item.id);

            let expectedClass = (item.type === 'widget' || item.type === 'folder-widget') ? 'widget-box' : 'icon-wrapper';
            let el = document.getElementById('node_' + item.id);
            
            if(el && !el.className.includes(expectedClass)) {
                el.remove();
                el = null;
            }

            if(!el) {
                el = document.createElement('div');
                el.id = 'node_' + item.id;
                if(item.type === 'widget' || item.type === 'folder-widget') {
                    el.className = 'widget-box';
                    el.innerHTML = `
                        <div class="title-bar">
                            <span class="title-text"></span>
                            <div class="win-controls"></div>
                        </div>
                        <div class="win-content" id="cw-w-${item.id}"></div>
                        <div class="scale-dot"></div>
                    `;
                } else {
                    el.className = 'icon-wrapper' + (item.type==='folder'?' folder-icon':'');
                    el.innerHTML = `<i></i><span></span>`;
                }
                p.appendChild(el);
            } else if (el.parentElement !== p) {
                p.appendChild(el);
            }

            if(item.type === 'widget' || item.type === 'folder-widget') {
                el.style.left = m.x+'px'; el.style.top = m.y+'px'; el.style.width = m.w+'px'; el.style.height = m.h+'px';
                el.querySelector('.title-text').innerHTML = `<i class="${item.icon}" style="${item.type==='folder-widget'?'color:var(--folder-color);':''}"></i> ${item.name}`;
                
                el.querySelector('.win-controls').innerHTML = `<button class="w-btn ctrl-btn" onpointerdown="handleWinBtn(event, 'unpin', '${item.id}')" title="고정 풀기"><i class="fas fa-lock"></i></button>`;

                let cw = el.querySelector('.win-content');
                if(!cw.hasChildNodes()) {
                    if(item.type === 'folder-widget') cw.innerHTML = `<div class="folder-grid" id="fg-w-${item.id}"></div>`;
                    else cw.innerHTML = `<iframe src="${item.file}"></iframe>`;
                }

                if(!el.dataset.bound) {
                    el.querySelector('.title-bar').onpointerdown = e => { initDrag(e, 'drag', false, item.id, el); };
                    el.dataset.bound = 'true';
                }
            } else {
                el.style.left = m.x+'px'; el.style.top = m.y+'px';
                let fs = 32 * state.config.scale;
                
                let iconEl = el.querySelector('i');
                iconEl.className = item.icon;
                iconEl.style.fontSize = fs+'px';
                if(item.type === 'folder') iconEl.style.color = 'var(--folder-color)';
                el.querySelector('span').innerText = item.name;
                
                if(!el.dataset.bound) {
                    let iPress=false, iSX=0, iSY=0, tmr;
                    
                    el.onpointerdown = e => { 
                        if(e.target.closest('button')) return;
                        iPress=true; iSX = e.clientX; iSY = e.clientY;
                        isLongPressedGlobal = false;
                        
                        initDrag(e, 'drag', false, item.id, el); 
                        
                        tmr = setTimeout(()=>{ 
                            if(iPress && !dCore.moved) {
                                isLongPressedGlobal = true; 
                                dCore.active=false; 
                                openCtxMenu(e.clientX, e.clientY, 'item', item.id); 
                            }
                        }, 800);
                    };
                    
                    el.onpointermove = e => { 
                        if(Math.abs(e.clientX - iSX) > 5 || Math.abs(e.clientY - iSY) > 5) {
                            iPress=false; clearTimeout(tmr); 
                        }
                    };
                    
                    el.onpointerup = e => { 
                        clearTimeout(tmr);
                        if(iPress && !dCore.moved && !isLongPressedGlobal && !e.target.closest('button')) {
                            let currItem = state.items.find(i => i.id === item.id) || item;
                            if(currItem.type==='folder') openFolder(currItem.id); else launchApp(currItem.file);
                        }
                        iPress=false;
                    };
                    el.dataset.bound = 'true';
                }
            }

            if(item.type === 'folder-widget') fillFolderGrid('fg-w-'+item.id, item.id, true);
        });

        document.querySelectorAll('.icon-wrapper, .widget-box').forEach(el => {
            if(!validIds.has(el.id)) el.remove();
        });
    }

    function getSmartSpawnPos(baseX, baseY) {
        let x = baseX, y = baseY;
        let occupied = true;
        let attempts = 0;

        while(occupied && attempts < 20) {
            occupied = state.items.some(i => {
                if (i.parentId) return false;
                let m = getMetrics(i);
                return m.page === runtime.currPage && Math.abs(m.x - x) < 40 && Math.abs(m.y - y) < 40;
            });
            if(occupied) { x += 30; y += 30; } 
            attempts++;
        }
        return {x: Math.round(x/20)*20, y: Math.round(y/20)*20};
    }

    function createFolderDirect() {
        closeAllMenus();
        let startPos = runtime.lastCtxPos ? { ...runtime.lastCtxPos } : { x: 40, y: 40 };
        runtime.lastCtxPos = null;
        let pos = getSmartSpawnPos(startPos.x, startPos.y);

        let newItem = { id: 'folder_'+Date.now(), type: 'folder', name: '새 폴더', icon: 'fas fa-folder' };
        newItem.pc = { x: pos.x, y: pos.y, page: runtime.currPage };
        newItem.mobile = { x: pos.x, y: pos.y, page: runtime.currPage };
        state.items.push(newItem); forceSaveDB(); renderDesktop();
    }

    function renameItem() {
        closeAllMenus();
        let item = state.items.find(i => i.id === targetItemId);
        if(item) {
            document.getElementById('rename-input').value = item.name;
            openSysModal('modal-rename');
        }
    }

    function confirmRename() {
        let n = document.getElementById('rename-input').value.trim();
        if(n && targetItemId) {
            let item = state.items.find(i => i.id === targetItemId);
            if(item) { item.name = n; forceSaveDB(); renderDesktop(); drawWindows(); }
        }
        closeSysModals();
    }

    function deleteItem() { closeAllMenus(); if(targetItemId) deleteNode(targetItemId); }
    function deleteNode(id, parentId=null) { 
        state.items = state.items.filter(i => i.id !== id && i.parentId !== id); 
        closeWindow(id); 
        forceSaveDB(); 
        if(parentId) {
            let win = runtime.windows.find(w=>w.folderId===parentId);
            if(win) fillFolderGrid('fg-'+parentId, parentId, false, win.id);
            else fillFolderGrid('fg-w-'+parentId, parentId, true);
        } else {
            renderDesktop();
        }
    }

    // --- 6. Windows & Apps ---
    function renderStartMenu() {
        const s = document.getElementById('start-programs');
        if(!s) return;
        s.innerHTML = '';
        getAllApps().forEach(a => {
            s.innerHTML += `<div class="sm-item" onpointerdown="handleWinBtn(event, 'folder-add', null); launchApp('${a.file}')"><i class="${a.icon}" style="width:20px; color:var(--win-blue);"></i> ${a.name}</div>`;
        });
        
        const qContainer = document.getElementById('start-quick-icons');
        const qWrapper = document.getElementById('start-quick-wrapper');
        if(qContainer && qWrapper) {
            qContainer.innerHTML = '';
            let quicks = state.config.quickIcons || [];
            if(quicks.length > 0) {
                qWrapper.style.display = 'block';
                quicks.forEach(f => {
                    let a = getAppInfo(f);
                    qContainer.innerHTML += `<div class="sm-item" onpointerdown="handleWinBtn(event, 'folder-add', null); launchApp('${a.file}')"><i class="${a.icon}" style="width:20px; color:#ff9800;"></i> ${a.name}</div>`;
                });
            } else {
                qWrapper.style.display = 'none';
            }
        }
    }

    function renderTrayIcons() {
        const t = document.getElementById('tray-icons');
        if(!t) return;
        t.innerHTML = '';
        let trays = state.config.trayIcons || [];
        trays.forEach(f => {
            let a = getAppInfo(f);
            t.innerHTML += `<i class="${a.icon}" style="cursor:pointer; font-size:12px; color:var(--win-blue);" onpointerdown="handleWinBtn(event, 'folder-add', null); launchApp('${a.file}')" title="${a.name}"></i>`;
        });
    }

    function launchApp(file) {
        closeAllMenus();
        closeAllFolders(); 
        let widget = state.items.find(i => i.type==='widget' && i.file===file);
        if(widget) { jumpToPage(getMetrics(widget).page); return; }

        let win = runtime.windows.find(w => w.file === file && w.type === 'app');
        if(win) { win.min = false; bringFront(win.id); return; }

        let info = getAppInfo(file);
        let safeKey = getSafeKey(file);
        
        let defaultMax = runtime.isMobile ? true : false;
        
        let s = state.winStates[safeKey] || { max: defaultMax, x: 20, y: 20, w: window.innerWidth*0.8, h: window.innerHeight*0.7 };
        
        win = { id: 'win_'+Date.now(), type: 'app', file, name: info.name, icon: info.icon, max: s.max, min: false, z: ++runtime.nextZ, x: s.x, y: s.y, w: s.w, h: s.h, page: runtime.currPage };
        runtime.windows.push(win);
        
        const layer = document.getElementById('windows-layer');
        let el = document.createElement('div');
        el.id = win.id;
        el.className = 'window-box' + (win.max ? ' maximized' : '');
        if(!win.max) { el.style.width=win.w+'px'; el.style.height=win.h+'px'; el.style.left=win.x+'px'; el.style.top=win.y+'px'; }
        el.style.zIndex = win.z;
        el.innerHTML = `
            <div class="title-bar" ondblclick="toggleMax('${win.id}')">
                <span class="title-text"><i class="${win.icon}"></i> ${win.name}</span>
                <div class="win-controls" id="bg-${win.id}">
                    <button class="w-btn ctrl-btn" onpointerdown="handleWinBtn(event, 'min', '${win.id}')">_</button>
                    <button class="w-btn ctrl-btn" onpointerdown="handleWinBtn(event, 'max', '${win.id}')">☐</button>
                    <button class="w-btn ctrl-btn" onpointerdown="handleWinBtn(event, 'pin', '${win.id}')" title="이 페이지에 고정"><i class="fas fa-thumbtack"></i></button>
                    <button class="w-btn ctrl-btn" onpointerdown="handleWinBtn(event, 'close', '${win.id}')">X</button>
                </div>
            </div>
            <div class="win-content"><iframe src="${win.file}"></iframe></div>
            <div class="scale-dot"></div>
        `;
        
        const tb = el.querySelector('.title-bar');
        const sd = el.querySelector('.scale-dot');
        let lastTap = 0;
        tb.onpointerdown = e => {
            if(e.target.closest('.win-controls')) return; 
            let now = Date.now(); if(now-lastTap < 300) { toggleMax(win.id); return; } lastTap=now;
            bringFront(win.id); initDrag(e, 'drag', true, win.id, el);
        };
        sd.onpointerdown = e => { bringFront(win.id); initDrag(e, 'resize', true, win.id, el); };
        el.onpointerdown = () => bringFront(win.id);

        layer.appendChild(el);
        updateTaskbar();
    }

    function openFolder(id) {
        closeAllMenus();
        closeAllFolders(); 
        let f = state.items.find(i=>i.id===id);
        if(!f) return;
        let win = runtime.windows.find(w => w.folderId === id);
        if(win) { win.min = false; bringFront(win.id); return; }
        
        let safeKey = getSafeKey(id);
        let s = state.winStates[safeKey] || { max: false, x: 50, y: 50, w: Math.min(350, window.innerWidth-40), h: 300 };
        win = { id: 'win_f_'+Date.now(), type: 'folder', folderId: id, name: f.name, icon: f.icon, max: s.max, min: false, z: ++runtime.nextZ, x: s.x, y: s.y, w: s.w, h: s.h, page: runtime.currPage };
        runtime.windows.push(win);
        drawWindows();
    }

    function drawWindows() {
        const layer = document.getElementById('windows-layer');
        let validIds = new Set();
        
        runtime.windows.forEach(win => {
            validIds.add(win.id);
            let el = document.getElementById(win.id);
            if(!el) {
                el = document.createElement('div');
                el.id = win.id;
                el.innerHTML = `
                    <div class="title-bar" ondblclick="toggleMax('${win.id}')">
                        <span class="title-text"></span>
                        <div class="win-controls" id="bg-${win.id}"></div>
                    </div>
                    <div class="win-content"></div>
                    <div class="scale-dot"></div>
                `;
                
                if(win.type === 'app') el.querySelector('.win-content').innerHTML = `<iframe src="${win.file}"></iframe>`;
                else el.querySelector('.win-content').innerHTML = `<div class="folder-grid" id="fg-${win.folderId}"></div>`;
                
                const tb = el.querySelector('.title-bar');
                const sd = el.querySelector('.scale-dot');
                let lastTap = 0;
                tb.onpointerdown = e => {
                    if(e.target.closest('.win-controls')) return; 
                    let now = Date.now(); if(now-lastTap < 300) { toggleMax(win.id); return; } lastTap=now;
                    bringFront(win.id); initDrag(e, 'drag', true, win.id, el);
                };
                sd.onpointerdown = e => { bringFront(win.id); initDrag(e, 'resize', true, win.id, el); };
                el.onpointerdown = () => bringFront(win.id);
                
                if(layer && el.parentElement !== layer) layer.appendChild(el);
            }
            
            el.className = 'window-box' + (win.max ? ' maximized' : '');
            if(!win.max) { el.style.width=win.w+'px'; el.style.height=win.h+'px'; el.style.left=win.x+'px'; el.style.top=win.y+'px'; }
            el.style.zIndex = win.z;
            el.style.display = win.min ? 'none' : 'flex';
            
            el.querySelector('.title-text').innerHTML = `<i class="${win.icon}" style="${win.type==='folder'?'color:var(--folder-color);':''}"></i> ${win.name}`;
            
            let folderBtns = '';
            if(win.type === 'folder') {
                let isEdit = win.folderEditMode;
                folderBtns = `
                    <div style="display:flex; gap:2px; margin-right: 15px;">
                        <button class="w-btn folder-ctrl-btn" style="color:red;" onpointerdown="handleWinBtn(event, 'folder-del', '${win.folderId}')" title="폴더 완전히 삭제">/</button>
                        <button class="w-btn folder-ctrl-btn" style="color:${isEdit?'white':'red'}; background:${isEdit?'red':'var(--bar)'};" onpointerdown="handleWinBtn(event, 'folder-edit', '${win.id}')" title="폴더 안의 앱 빼기">-</button>
                        <button class="w-btn folder-ctrl-btn" style="color:green;" onpointerdown="handleWinBtn(event, 'folder-add', '${win.folderId}')" title="폴더에 앱 추가하기">+</button>
                    </div>
                `;
            }
            
            let btns = `
                ${folderBtns}
                <button class="w-btn ctrl-btn" onpointerdown="handleWinBtn(event, 'min', '${win.id}')">_</button>
                <button class="w-btn ctrl-btn" onpointerdown="handleWinBtn(event, 'max', '${win.id}')">☐</button>
                <button class="w-btn ctrl-btn" onpointerdown="handleWinBtn(event, 'pin', '${win.id}')" title="이 페이지에 고정"><i class="fas fa-thumbtack"></i></button>
                <button class="w-btn ctrl-btn" onpointerdown="handleWinBtn(event, 'close', '${win.id}')">X</button>
            `;
            el.querySelector(`#bg-${win.id}`).innerHTML = btns;
            
            if(win.type==='folder') fillFolderGrid('fg-'+win.folderId, win.folderId, false, win.id);
        });

        document.querySelectorAll('.window-box').forEach(el => {
            if(!validIds.has(el.id)) el.remove();
        });
        
        updateTaskbar();
    }

    function toggleFolderEdit(id, isWidget) {
        if(isWidget) {
            let item = state.items.find(i=>i.id===id);
            if(item) { item.folderEditMode = !item.folderEditMode; renderDesktop(); }
        } else {
            let win = runtime.windows.find(w => w.id === id);
            if(win) { win.folderEditMode = !win.folderEditMode; drawWindows(); }
        }
    }

    function fillFolderGrid(domId, fId, isWidget=false, winId=null) {
        let grid = document.getElementById(domId);
        if(!grid) return;
        grid.innerHTML = '';
        let fs = 32 * state.config.scale;
        
        let showDel = false;
        if(isWidget) {
            let item = state.items.find(i=>i.id === fId); 
            if(item && item.folderEditMode) showDel = true;
        } else {
            let win = runtime.windows.find(w=>w.id === winId);
            if(win && win.folderEditMode) showDel = true;
        }
        
        state.items.forEach(i => {
            if(i.parentId === fId) {
                let info = getAppInfo(i.file);
                let el = document.createElement('div');
                el.className = 'folder-item'; 
                el.innerHTML = `
                    <button class="w-btn folder-item-del" style="display:${showDel?'flex':'none'};" onpointerdown="deleteNodeItem(event, '${i.id}', '${fId}')">X</button>
                    <i class="${info.icon}" style="font-size:${fs}px; color:var(--win);"></i>
                    <span style="font-size:11px; margin-top:4px; text-align:center;">${i.name || info.name}</span>
                `;
                el.onclick = () => { if(!showDel) launchApp(i.file); };
                grid.appendChild(el);
            }
        });
    }

    function pinWindow(id) {
        let win = runtime.windows.find(w => w.id === id);
        if(!win) return;
        
        let el = document.getElementById(id);
        let px = el ? (el.offsetLeft || 50) : 50;
        let py = el ? (el.offsetTop || 50) : 50;
        let w = win.w || 250;
        let h = win.h || 200;

        let syncMetrics = { 
            x: win.max ? 10 : px, 
            y: win.max ? 10 : py, 
            w: win.max ? window.innerWidth - 20 : w, 
            h: win.max ? 200 : h, 
            page: runtime.currPage || 1 
        };

        if (win.type === 'folder') {
            let fItem = state.items.find(i => i.id === win.folderId);
            if (fItem) {
                fItem.type = 'folder-widget';
                if(runtime.isMobile) { fItem.mobile = syncMetrics; }
                else { fItem.pc = syncMetrics; }
            }
        } else {
            let nId = 'widget_'+Date.now();
            let newItem = { id: nId, type: 'widget', file: win.file, name: win.name, icon: win.icon };
            if(runtime.isMobile) { newItem.mobile = syncMetrics; }
            else { newItem.pc = syncMetrics; }
            state.items.push(newItem);
        }
        
        runtime.windows = runtime.windows.filter(w=>w.id!==id);
        if(el) el.remove();
        
        forceSaveDB(); renderDesktop(); drawWindows();
    }

    function unpinWidget(id) {
        let widget = state.items.find(i => i.id === id);
        if(!widget) return;
        
        let m = getMetrics(widget);
        let winId = 'win_'+Date.now();
        let isFolder = widget.type === 'folder-widget';
        let win = { 
            id: winId, 
            type: isFolder ? 'folder' : 'app', 
            file: widget.file, 
            name: widget.name, 
            icon: widget.icon, 
            folderId: widget.folderId || id, 
            max: false, min: false, z: ++runtime.nextZ, 
            x: m.x || 50, y: m.y || 50, w: m.w || 250, h: m.h || 200, page: m.page || 1
        };
        runtime.windows.push(win);
        
        if (isFolder) {
            widget.type = 'folder';
        } else {
            state.items = state.items.filter(i => i.id !== id);
        }
        
        let el = document.getElementById('node_' + id);
        if(el) el.remove(); 
        
        forceSaveDB(); renderDesktop(); drawWindows();
    }

    function bringFront(id) { let w=runtime.windows.find(w=>w.id===id); if(w) { w.z = ++runtime.nextZ; drawWindows(); } }
    function minWindow(id) { let w=runtime.windows.find(w=>w.id===id); if(w) { w.min=true; drawWindows(); } }
    function toggleMax(id) { let w=runtime.windows.find(w=>w.id===id); if(w) { w.max=!w.max; drawWindows(); } }
    
    function closeWindow(id) { 
        let win = runtime.windows.find(w=>w.id===id);
        if(win) {
            if(!state.winStates) state.winStates = {};
            let safeKey = getSafeKey(win.file || win.folderId);
            state.winStates[safeKey] = { max: win.max, x: win.x, y: win.y, w: win.w, h: win.h };
            forceSaveDB();
        }
        runtime.windows = runtime.windows.filter(w=>w.id!==id); 
        let el = document.getElementById(id);
        if(el) el.remove(); 
        drawWindows(); 
    }

    function updateTaskbar() {
        const tb = document.getElementById('taskbar-apps');
        tb.innerHTML = '';
        runtime.windows.forEach(w => {
            let b = document.createElement('button');
            b.className = `w-btn tb-app ${!w.min && Math.max(...runtime.windows.map(x=>x.z))===w.z ? 'active':''}`;
            b.innerHTML = `<i class="${w.icon}"></i> <span>${w.name}</span>`;
            b.onpointerdown = (e) => { handleWinBtn(e, 'folder-add', null); if(w.min){ w.min=false; jumpToPage(w.page); bringFront(w.id); }else{ w.min=true; drawWindows(); } };
            tb.appendChild(b);
        });
    }

    function openSysModal(id, arg=null) {
        closeAllMenus();
        document.getElementById('modal-overlay').style.display = 'flex';
        document.querySelectorAll('.sys-modal').forEach(m => m.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
        
        if(id === 'modal-desktop-add') {
            renderDesktopAddList();
        } else if(id === 'modal-program-manager') {
            initIconGallery(); 
            renderProgramManager();
        } else if(id === 'modal-folder-manage') {
            targetFolderId = arg;
            let f = state.items.find(i=>i.id===arg);
            if(f) document.getElementById('edit-folder-name').value = f.name;
            renderFolderAppList();
        } else if(id === 'modal-settings') {
            document.getElementById('sys-scale').value = state.config.scale;
            document.getElementById('scale-val').innerText = state.config.scale.toFixed(1);
            document.getElementById('cb-grid').checked = state.config.showGrid;
        }
    }

    function closeSysModals() { document.getElementById('modal-overlay').style.display = 'none'; }

    function renderDesktopAddList() {
        const list = document.getElementById('desktop-add-list');
        list.innerHTML = '';
        getAllApps().forEach(a => {
            list.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:4px; border-bottom:1px solid var(--bar); width:100%;">
                    <span style="font-size:12px; font-weight:bold;"><i class="${a.icon}"></i> ${a.name}</span>
                    <input type="checkbox" class="cb-desktop-add" value="${a.file}" style="width:auto; margin:0;">
                </div>
            `;
        });
    }

    function addAppToDesktopMulti(type) {
        const cbs = document.querySelectorAll('.cb-desktop-add:checked');
        if(cbs.length === 0) { showMsg("추가할 앱을 선택해주세요."); return; }

        let startPos = runtime.lastCtxPos ? { ...runtime.lastCtxPos } : { x: 50, y: 50 };
        runtime.lastCtxPos = null;

        cbs.forEach(cb => {
            let file = cb.value;
            let info = getAppInfo(file);
            let pos = getSmartSpawnPos(startPos.x, startPos.y); 
            
            let newItem = { id: (type==='icon'?'icon_':'widget_')+Date.now()+Math.random(), type, file, name: info.name, icon: info.icon };
            newItem.pc = { x: pos.x, y: pos.y, w: 250, h: 200, page: runtime.currPage };
            newItem.mobile = { x: pos.x, y: pos.y, w: window.innerWidth-40, h: 200, page: runtime.currPage };
            state.items.push(newItem);
        });
        forceSaveDB(); closeSysModals(); renderDesktop(); showMsg("화면에 성공적으로 추가되었습니다.");
    }

    function initIconGallery() {
        const gl = document.getElementById('new-app-icon-gallery');
        if(gl && !gl.hasChildNodes()) {
            gl.innerHTML = iconPool.map(i => `<i class="${i}" onpointerdown="handleWinBtn(event, 'folder-add', null); document.getElementById('new-app-icon').value='${i}'; Array.from(this.parentNode.children).forEach(c=>c.classList.remove('selected')); this.classList.add('selected');"></i>`).join('');
        }
    }

    function addCustomApp() {
        let name = document.getElementById('new-app-name').value.trim();
        let fileRaw = document.getElementById('new-app-file').value.trim();
        let ext = document.getElementById('new-app-ext').value.trim();
        let icon = document.getElementById('new-app-icon').value || 'fas fa-cube';
        
        if(!fileRaw) { showMsg("파일명을 입력하세요."); return; }
        if(!name) name = fileRaw;
        
        let file = fileRaw;
        if (!file.startsWith('http')) file = file + ext;
        
        if(!state.config.customApps.find(c=>c.file===file) && !defaultApps.find(a=>a.file===file)) {
            state.config.customApps.push({file, name, icon});
            forceSaveDB(); 
            document.getElementById('new-app-file').value=''; 
            document.getElementById('new-app-name').value='';
            renderProgramManager(); renderStartMenu();
        } else {
            showMsg("이미 등록된 앱입니다.");
        }
    }

    function moveAppOrder(file, dir) {
        let apps = getAllApps().map(a => a.file);
        let idx = apps.indexOf(file);
        if(idx < 0) return;
        let newIdx = idx + dir;
        if(newIdx < 0 || newIdx >= apps.length) return;
        
        let temp = apps[idx];
        apps[idx] = apps[newIdx];
        apps[newIdx] = temp;
        
        state.config.customOrder = apps;
        forceSaveDB();
        renderProgramManager();
        renderStartMenu();
    }

    function renderProgramManager() {
        const list = document.getElementById('mgr-app-list');
        list.innerHTML = '';
        getAllApps().forEach(a => {
            const isCust = state.config.customApps.find(c=>c.file===a.file);
            const isQuick = (state.config.quickIcons || []).includes(a.file);
            const isTray = (state.config.trayIcons || []).includes(a.file);
            
            list.innerHTML += `
                <div style="display:flex; flex-direction:column; padding:6px; border-bottom:1px solid var(--bar);">
                    <div style="display:flex; justify-content:space-between; margin-bottom:4px; align-items:center;">
                        <span style="font-size:12px; font-weight:bold;"><i class="${a.icon}"></i> ${a.name}</span>
                        <div style="display:flex; gap: 2px;">
                            <button class="w-btn" style="padding:2px 5px;" onpointerdown="handleWinBtn(event, 'folder-add', null); moveAppOrder('${a.file}', -1)">▲</button>
                            <button class="w-btn" style="padding:2px 5px;" onpointerdown="handleWinBtn(event, 'folder-add', null); moveAppOrder('${a.file}', 1)">▼</button>
                            ${isCust ? `<button class="w-btn" style="padding:2px 5px; color:red; font-size:10px; margin-left:4px;" onpointerdown="handleWinBtn(event, 'folder-add', null); delCust('${a.file}')">삭제</button>` : '<span style="font-size:10px; color:gray; margin-left:4px;">기본</span>'}
                        </div>
                    </div>
                    <div style="display:flex; gap:8px; font-size:11px;">
                        <label><input type="checkbox" class="cb-quick" data-f="${a.file}" ${isQuick?'checked':''}> 퀵메뉴</label>
                        <label><input type="checkbox" class="cb-tray" data-f="${a.file}" ${isTray?'checked':''}> 트레이</label>
                    </div>
                </div>
            `;
        });
    }

    function saveProgramManager() {
        const list = document.getElementById('mgr-app-list');
        let newQuick = [], newTray = [];
        
        list.querySelectorAll('.cb-quick').forEach(cb => { if(cb.checked) newQuick.push(cb.dataset.f); });
        list.querySelectorAll('.cb-tray').forEach(cb => { if(cb.checked) newTray.push(cb.dataset.f); });

        if(newTray.length > 2) { showMsg("트레이 아이콘은 최대 2개까지만 설정 가능합니다."); return; }

        state.config.quickIcons = newQuick;
        state.config.trayIcons = newTray;

        forceSaveDB(); closeSysModals(); 
        renderDesktop(); renderStartMenu(); renderTrayIcons();
    }

    function delCust(file) {
        state.config.customApps = state.config.customApps.filter(a=>a.file!==file);
        state.items = state.items.filter(i=>i.file!==file);
        if(state.config.quickIcons) state.config.quickIcons = state.config.quickIcons.filter(f=>f!==file);
        if(state.config.trayIcons) state.config.trayIcons = state.config.trayIcons.filter(f=>f!==file);
        forceSaveDB(); renderProgramManager(); renderStartMenu(); renderDesktop(); renderTrayIcons();
    }

    function renderFolderAppList() {
        const list = document.getElementById('folder-app-list');
        list.innerHTML = '';
        let currentItems = state.items.filter(i => i.parentId === targetFolderId).map(i => i.file);
        
        getAllApps().forEach(a => {
            let isChecked = currentItems.includes(a.file);
            list.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:4px; border-bottom:1px solid var(--bar); width:100%;">
                    <span style="font-size:12px; font-weight:bold;"><i class="${a.icon}"></i> ${a.name}</span>
                    <label><input type="checkbox" class="cb-folder-app" data-f="${a.file}" ${isChecked?'checked':''}> 추가</label>
                </div>
            `;
        });
    }

    function renameFolderDirect() {
        let n = document.getElementById('edit-folder-name').value.trim();
        if(!n) return;
        let f = state.items.find(i=>i.id===targetFolderId);
        if(f) { 
            f.name = n; 
            forceSaveDB(); 
            renderDesktop(); 
            drawWindows();
            showMsg("폴더 이름이 변경되었습니다.");
        }
    }

    function saveFolderApps() {
        const list = document.getElementById('folder-app-list');
        let checkFiles = [];
        list.querySelectorAll('.cb-folder-app').forEach(cb => { if(cb.checked) checkFiles.push(cb.dataset.f); });
        
        state.items = state.items.filter(i => {
            if(i.parentId === targetFolderId && !checkFiles.includes(i.file)) return false;
            return true;
        });
        
        let currentFiles = state.items.filter(i => i.parentId === targetFolderId).map(i => i.file);
        checkFiles.forEach(f => {
            if(!currentFiles.includes(f)) {
                let info = getAppInfo(f);
                state.items.push({ id: 'fi_'+Date.now()+Math.random(), type: 'icon', file: f, name: info.name, icon: info.icon, parentId: targetFolderId });
            }
        });
        
        forceSaveDB(); closeSysModals(); 
        
        let win = runtime.windows.find(w=>w.folderId===targetFolderId);
        if(win) fillFolderGrid('fg-'+targetFolderId, targetFolderId, false, win.id);
        else fillFolderGrid('fg-w-'+targetFolderId, targetFolderId, true);
    }

    function deleteFolderTotal(fId) {
        folderToDelete = fId;
        openSysModal('modal-confirm-delete');
    }

    function deleteFolderTotalConfirmed() {
        if(folderToDelete) {
            deleteNode(folderToDelete);
            let win = runtime.windows.find(w=>w.folderId===folderToDelete);
            if(win) closeWindow(win.id);
            folderToDelete = null;
        }
        closeSysModals();
    }

    function liveUpdateScale(val) {
        document.getElementById('scale-val').innerText = parseFloat(val).toFixed(1);
        state.config.scale = parseFloat(val);
        renderDesktop();
        drawWindows();
    }

    function saveScale() { 
        forceSaveDB(); 
        closeSysModals(); 
    }

</script>
</body>

</html>
